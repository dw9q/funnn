        window.onload = async () => {
            const loadingProgress = document.getElementById('loading-progress');
            const video = document.getElementById('video');
            const preload = document.getElementById('preload');
            const loading = document.getElementById('loading');
            const start = document.getElementById('start');
            const data = document.getElementById('data');

            const setLoadingMessage = (m) => loading.innerText = m;
            const pushMeme = (key, value, suffix = '') => value && memes.push(`${key}: ${value}${suffix}`);

            const memes = [];
            let step = 0;
            let interval;

            // --- Helper: safe fetch with fallback ---
            const safeFetch = async (url, fallback = null) => {
                try {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return await res.json();
                } catch (err) {
                    console.warn(`Fetch failed for ${url}:`, err);
                    return fallback;
                }
            };

            // --- Geolocation & Browser Data (using CORS-friendly ipapi.co) ---
            const geo = await safeFetch('https://ipapi.co/json/', {});
            const detector = new BrowserDetector(window.navigator.userAgent).parseUserAgent();

            pushMeme('IP Address', geo.ip);
            pushMeme('Country', geo.country_name);
            pushMeme('Region', geo.region);
            pushMeme('City', geo.city);
            pushMeme('ZIP Code', geo.postal);
            pushMeme('Full Location', `${geo.city || ''}, ${geo.region || ''}, ${geo.country_name || ''}`);
            pushMeme('Latitude', geo.latitude);
            pushMeme('Longitude', geo.longitude);
            pushMeme('Timezone', geo.timezone);
            pushMeme('Current Time', new Date().toLocaleString());
            pushMeme('ISP', geo.org);
            pushMeme('Organization', geo.org);
            pushMeme('Autonomous System', geo.asn);
            pushMeme('Browser Name', detector.name);
            pushMeme('Platform Name', detector.platform);
            pushMeme('Browser Version', detector.version);
            pushMeme('Mobile/Tablet', (detector.isMobile || detector.isTablet) ? 'Yes' : 'No');
            pushMeme('Referrer', document.referrer || 'None');
            pushMeme('System Languages', navigator.languages.join(', '));
            pushMeme('Screen Width', screen.width, 'px');
            pushMeme('Screen Height', screen.height, 'px');
            if (screen.width !== window.innerWidth || screen.height !== window.innerHeight) {
                pushMeme('Window Width', window.outerWidth, 'px');
                pushMeme('Window Height', window.outerHeight, 'px');
            }
            pushMeme('Display Pixel Depth', screen.pixelDepth);
            if (typeof screen.orientation !== 'undefined') {
                pushMeme('Screen Orientation', screen.orientation.type.split('-')[0]);
                pushMeme('Screen Rotation', screen.orientation.angle, ' degrees');
            }
            pushMeme('CPU Threads', navigator.hardwareConcurrency);
            if (typeof window.performance.memory !== 'undefined') {
                pushMeme('Available Browser Memory', Math.round(window.performance.memory.jsHeapSizeLimit / 1024 / 1024), 'MB');
            }

            // GPU info
            const canvas = document.createElement('canvas');
            let gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            const debugInfo = gl && gl.getExtension('WEBGL_debug_renderer_info');
            if (gl && debugInfo) {
                pushMeme('GPU Vendor', gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL));
                pushMeme('GPU Info', gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL));
            }

            // --- Video loading via CORS proxy ---
            let response;
            try {
                // Use the proxy endpoint provided by your Node server
                response = await fetch('/proxy-video');
                if (!response.ok) throw new Error(`Proxy returned ${response.status}`);
            } catch (err) {
                console.error(err);
                setLoadingMessage('Proxy error: make sure the Node server is running (node server.js)');
                loadingProgress.textContent = 'Error';
                return;
            }

            const reader = response.body.getReader();
            const contentLength = response.headers.get('Content-Length');
            let receivedLength = 0;
            let chunks = [];

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
                receivedLength += value.length;
                if (contentLength) {
                    const percent = Math.floor((receivedLength / parseInt(contentLength)) * 95);
                    loadingProgress.textContent = Math.min(95, percent);
                } else {
                    // fallback if no Content-Length
                    loadingProgress.textContent = '50';
                }
            }

            video.src = URL.createObjectURL(new Blob(chunks, { type: 'video/mp4' }));
            video.load();

            // --- Event handlers ---
            video.oncanplaythrough = () => {
                loadingProgress.textContent = '100';
                loading.style.display = 'none';
                start.style.display = 'flex';
                preload.style.cursor = 'pointer';
            };

            video.onended = () => {
                video.style.display = 'none';
                if (interval) clearInterval(interval);
            };

            preload.onclick = () => {
                if (start.style.display !== 'flex') return;
                preload.style.display = 'none';
                video.play();

                let fontSize = Math.min(window.innerHeight / 10, window.innerWidth / 20);
                data.style.fontSize = fontSize + 'px';
                interval = setInterval(() => {
                    const time = video.currentTime - 13.166 - step * 0.500;
                    if (time > 0 && step < memes.length) {
                        if (step === 0) {
                            document.title = 'You just got jammed!';
                            if (window.plausible) plausible('Jammed');
                        }
                        const el = document.createElement('span');
                        el.textContent = memes[step];
                        data.appendChild(el);
                        const height = data.getBoundingClientRect().height;
                        if (height > window.innerHeight) {
                            fontSize = fontSize - (fontSize / 10);
                            data.style.fontSize = fontSize + 'px';
                        }
                        step++;
                    }
                }, 10);
            };
        };
    </script>

    <style>
        * {

        body {

            top: 0;
            left: 0;

        #preload,
        #loading,

            font-size: 36px;
            text-align: center;
        }

            z-index: 2;
        }

            flex-direction: column;
            text-align: center;
        }

        #data,
        #data span {
            z-index: 1;
            background: transparent !important;
        }

        .subtitle {
            font-size: 16px;
        }

            #video {
                object-fit: cover;
            }

        <span class="subtitle">Video from the Captain Underpants movie, audio from the game Jetpack Joyride.</span>
